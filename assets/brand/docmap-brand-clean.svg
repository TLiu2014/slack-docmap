<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DocMap - Slack document intelligence">
  <defs>
    <radialGradient id="glow" cx="0.29" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#6366F1" stop-opacity="0.38"/>
      <stop offset="0.55" stop-color="#4338CA" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#4338CA" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M72 0H0V72" fill="none" stroke="#FFFFFF" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <linearGradient id="iconBg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <radialGradient id="iconSheen" cx="0.28" cy="0.22" r="0.9">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="iconShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#0A0D18"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- App icon -->
  <g transform="translate(122 218) scale(0.37109)" filter="url(#iconShadow)">
    <rect width="512" height="512" rx="120" fill="url(#iconBg)"/>
    <rect width="512" height="512" rx="120" fill="url(#iconSheen)"/>
    <g transform="translate(256 256) scale(1.3) translate(-256 -256)">
      <g stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="16" stroke-linecap="round">
        <line x1="185" y1="331" x2="285" y2="166"/>
        <line x1="185" y1="331" x2="345" y2="346"/>
        <line x1="285" y1="166" x2="345" y2="346"/>
      </g>
      <g fill="#FFFFFF">
        <circle cx="285" cy="166" r="38"/>
        <circle cx="345" cy="346" r="32"/>
      </g>
      <g>
        <path d="M143 285 a12 12 0 0 1 12 -12 H197 L227 303 V371 a12 12 0 0 1 -12 12 H155 a12 12 0 0 1 -12 -12 Z" fill="#FFFFFF"/>
        <path d="M197 273 V303 H227 Z" fill="#C7D2FE"/>
        <g stroke="#4F46E5" stroke-width="9" stroke-linecap="round" stroke-opacity="0.9">
          <line x1="162" y1="322" x2="208" y2="322"/>
          <line x1="162" y1="341" x2="208" y2="341"/>
          <line x1="162" y1="360" x2="194" y2="360"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Wordmark + subtitle -->
  <text x="344" y="340"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-size="118" font-weight="700" letter-spacing="-3" fill="#FFFFFF">DocMap</text>
  <text x="348" y="400"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-size="34" font-weight="600" letter-spacing="-0.2" fill="#A5B4FC">Turn shared links into a living map</text>
</svg>
