services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: slack-docmap-server:latest
    container_name: slack-docmap-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    environment:
      PORT: 3000
      # Override UI_BASE_URL when shipping to a non-local host.
      UI_BASE_URL: ${UI_BASE_URL:-http://localhost:5173}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
