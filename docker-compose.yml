# Local Docker stack — builds the image from the current source tree and
# runs the app on http://localhost:3000. In-memory graph store (see
# server/src/store.ts), so restarts wipe any graphs produced.
#
# Most of the time you don't need this — `pnpm dev` is faster for local
# iteration. Use compose when you want to reproduce the deployed image
# locally (e.g. sanity-check the Dockerfile before pushing).
#
# For deployment on the GCE VM, use docker-compose.prod.yml (image-only,
# no build context).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: slack-docmap:latest
    container_name: docmap-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    environment:
      PORT: 3000
      UI_BASE_URL: ${UI_BASE_URL:-http://localhost:3000}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
